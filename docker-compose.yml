name: bengkelmotor

services:
  db:
    build:
      context: .docker/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-bengkel_motor}
      MYSQL_USER: ${DB_USER:?set DB_USER in .env}
      MYSQL_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - default

  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .docker/nginx

        - action: rebuild
          path: ./app
          ignore:
            - ./app/node_modules/**
            - ./app/.dockerignore
            - ./app/.env.example
            - ./app/.gitignore
            - ./app/README.md

        - action: rebuild
          path: ./landing
          ignore:
            - ./landing/node_modules/**
            - ./landing/.dockerignore
            - ./landing/.env
            - ./landing/.gitignore
    networks:
      - default
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - ./backend/node_modules/**
            - ./backend/.dockerignore
            - ./backend/.env.example
            - ./backend/.gitignore
            - ./backend/README.md
    env_file:
      - ./backend/.env
    environment:
      # Secrets (DB_USER/DB_PASS/DB_NAME/JWT_SECRET/VAPID_*) come from backend/.env
      # (gitignored, never commit real values). Only the docker-network hostname
      # is overridden here since "db" resolves via the compose network, not localhost.
      DB_HOST: db
    networks:
      - default
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/.docker/mysql/data
      o: bind

networks:
  default:
    driver: bridge